<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/img/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0C111B" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DVLS4LMPGV"></script>
    <script>
      const analyticsConsentKey = 'sipdep.analytics.consent';

      window.dataLayer = window.dataLayer || [];
      window.gtag = function gtag(){window.dataLayer.push(arguments);}
      window.gtag('js', new Date());
      window.gtag('consent', 'default', {
        analytics_storage: 'denied'
      });
      window.gtag('config', 'G-DVLS4LMPGV', {
        send_page_view: false
      });

      window.sipdepAnalytics = {
        hasConsent() {
          try {
            return window.localStorage.getItem(analyticsConsentKey) === 'granted';
          } catch {
            return false;
          }
        },
        grantConsent() {
          try {
            window.localStorage.setItem(analyticsConsentKey, 'granted');
          } catch {}
          window.gtag('consent', 'update', {
            analytics_storage: 'granted'
          });
        },
        revokeConsent() {
          try {
            window.localStorage.removeItem(analyticsConsentKey);
          } catch {}
          window.gtag('consent', 'update', {
            analytics_storage: 'denied'
          });
        }
      };

      if (window.sipdepAnalytics.hasConsent()) {
        window.gtag('consent', 'update', {
          analytics_storage: 'granted'
        });
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
